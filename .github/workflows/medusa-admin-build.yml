name: Medusa Admin Build

on:
  push:
    branches-ignore:
      - build

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure npm cache directory
        run: |
          mkdir -p ~/.npm
          npm config set cache ~/.npm --global
          echo "Cache directory: $(npm config get cache)"

      - name: Clean npm cache and node_modules
        run: |
          npm cache clean --force --loglevel=error || true
          rm -rf node_modules package-lock.json || true
          echo "✓ Cache and node_modules cleaned"

      - name: Install dependencies with npm ci
        run: |
          npm ci --verbose 2>&1 | tail -100
        timeout-minutes: 45
        continue-on-error: true

      - name: Check for missing dependencies
        if: failure()
        run: |
          echo "=== Checking for missing packages ==="
          npm ls --depth=0 2>&1 | grep -E "missing|invalid|extraneous" | head -30 || true
          echo ""
          echo "=== Attempting fresh install ==="

      - name: Retry with npm install (fresh attempt)
        if: failure()
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps --verbose 2>&1 | tail -100
        timeout-minutes: 45

      - name: Verify all dependencies are installed
        run: |
          echo "=== Checking dependencies ==="
          npm ls --depth=0 2>&1 | head -50
          
          # Check for critical missing packages
          MISSING=$(npm ls 2>&1 | grep -c "missing:" || true)
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: Still have missing dependencies. Running npm install again..."
            npm install 2>&1 | tail -50
          fi
          
          # Verify node_modules size
          echo ""
          echo "node_modules size: $(du -sh node_modules | cut -f1)"
          echo "✓ Dependency check complete"

      - name: Build project
        run: npm run build
        timeout-minutes: 30
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          if [ ! -d ".medusa" ]; then
            echo "ERROR: Build output (.medusa) directory not found"
            ls -la | grep medusa || echo "No medusa directory found"
            exit 1
          fi
          echo "✓ Build output verified"
          du -sh .medusa
          find .medusa -type f | head -20

      - name: Create build branch and push artifacts
        run: |
          set -e
          
          # Backup build output
          rm -rf /tmp/medusa-admin-build
          mkdir -p /tmp/medusa-admin-build
          cp -R .medusa/. /tmp/medusa-admin-build/
          
          # Switch to build branch
          git fetch origin build || true
          if git show-ref --verify --quiet refs/remotes/origin/build; then
            git checkout build
          else
            git checkout --orphan build
            git reset --hard
          fi
          
          # Replace content and commit
          git rm -rf . || true
          cp -R /tmp/medusa-admin-build/. .
          
          git add -A
          if git diff --cached --quiet; then
            echo "✓ No changes in build artifacts"
            exit 0
          fi
          
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "Build medusa-admin at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          git push --force origin build
          echo "✓ Build artifacts pushed successfully"

      - name: Install and build server (optional)
        if: hashFiles('server/package.json') != ''
        run: |
          cd server
          echo "Installing server dependencies..."
          npm install --legacy-peer-deps 2>&1 | tail -30
          
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            echo "Building server..."
            npm run build 2>&1 | tail -30
          fi
        timeout-minutes: 30
        continue-on-error: true

      - name: Workflow Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Build Workflow Summary"
          echo "=========================================="
          echo "✓ Checkout: Complete"
          echo "✓ Node setup: v$(node --version)"
          echo "✓ npm version: v$(npm --version)"
          echo "✓ node_modules: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"
          if [ -d ".medusa" ]; then
            echo "✓ Build output: $(du -sh .medusa | cut -f1)"
          else
            echo "✗ Build output: NOT FOUND"
          fi
          echo "=========================================="