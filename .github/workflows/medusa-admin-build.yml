name: Medusa Admin Build

on:
  push:
    branches-ignore:
      - build

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Don't use cache here since we may not have a lockfile yet

      - name: Fix npm config (override any bad .npmrc prefix/cache)
        run: |
          npm config set cache ~/.npm --global
          npm config set prefix ~/.npm-global --global
          echo "Cache: $(npm config get cache)"
          echo "Prefix: $(npm config get prefix)"
          # Show if there's a project-level .npmrc causing issues
          cat .npmrc 2>/dev/null || echo "No project .npmrc found"

      - name: Install dependencies
        run: |
          # If no lockfile exists, generate one first
          if [ ! -f "package-lock.json" ]; then
            echo "No package-lock.json found — running npm install to generate one..."
            npm install --legacy-peer-deps
          else
            echo "Lockfile found — running npm ci..."
            npm ci
          fi
        timeout-minutes: 45

      - name: Build project
        run: npm run build
        timeout-minutes: 30
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          if [ ! -d ".medusa" ]; then
            echo "ERROR: Build output (.medusa) not found"
            ls -la
            exit 1
          fi
          echo "✓ Build verified: $(du -sh .medusa | cut -f1)"

      - name: Push artifacts to build branch
        run: |
          set -e
          rm -rf /tmp/build-out
          cp -R .medusa /tmp/build-out

          git fetch origin build || true
          if git show-ref --verify --quiet refs/remotes/origin/build; then
            git checkout build
          else
            git checkout --orphan build
            git reset --hard
          fi

          git rm -rf . || true
          cp -R /tmp/build-out/. .

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi

          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "Build at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push --force origin build
          echo "✓ Pushed to build branch"

      - name: Summary
        if: always()
        run: |
          echo "Node: $(node --version) | npm: $(npm --version)"
          echo "node_modules: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"
          [ -d ".medusa" ] && echo "✓ .medusa: $(du -sh .medusa | cut -f1)" || echo "✗ .medusa not found"